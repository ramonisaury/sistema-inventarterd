<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Cotización e Inventario</title>
    <style>
        :root {
            --primary: #d46300;
            --primary-hover: #f58300;
            --success: #16a34a;
            --danger: #dc2626;
            --accent: #ea8e2d;
            --bg: #f4f6f9;
            --text: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: var(--text);
            padding-bottom: 50px;
        }

        /* --- ESTADO INICIAL (OCULTO) --- */
        nav, .container, #global-table-container {
            display: none;
        }

        /* --- CLASES DE ACTIVACIÓN --- */
        .show-flex { display: flex !important; }
        .show-block { display: block !important; }
        .container.active { display: block !important; }

        /* --- Login Box --- */
        #loginBox {
            display: block; /* Se ve por defecto */
            max-width: 350px;
            margin-top: 100px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px #ccc;
        }

        /* --- Navegación --- */
        nav {
            background: white;
            width: 100%;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        nav button {
            padding: 15px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            color: #666;
            border-bottom: 3px solid transparent;
            transition: 0.3s;
        }

        nav button.active {
            color: var(--primary);
            border-bottom: 3px solid var(--primary);
        }

        /* --- Contenedores --- */
        .container {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 95%;
            max-width: 500px;
            margin-top: 10px;
        }

        .wide { max-width: 850px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

        label { display: block; margin-top: 10px; font-size: 13px; font-weight: bold; }
        input, select, button {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
            box-sizing: border-box;
        }

        button { 
            background: var(--primary); 
            color: white; 
            border: none; 
            cursor: pointer; 
            font-weight: bold; 
            margin-top: 15px; 
        }

        .btn-add { background: var(--accent); }
        .btn-success { background: var(--success); }
        .btn-del { background: var(--danger); width: auto; padding: 4px 8px; font-size: 11px; margin: 0; }

        /* --- Tabla --- */
        .table-section { margin-top: 30px; width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; background: white; font-size: 13px; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
        .total-row { font-weight: bold; font-size: 16px; background: #f1f5f9; }

        @media print {
            nav, .no-print, button, .btn-del { display: none !important; }
            .container, .wide { display: block !important; box-shadow: none !important; width: 100% !important; max-width: 100% !important; }
            #global-table-container { display: block !important; }
        }
    </style>
</head>
<body>

<div id="loginBox">
    <h3>Iniciar Sesión</h3>
    <input type="text" id="login_user" placeholder="Usuario">
    <input type="password" id="login_pass" placeholder="Contraseña">
    <button onclick="login()">Entrar</button>
</div>

<nav id="mainNav" class="no-print">
    <button id="btn-c1" onclick="tab(event, 'c1')">Costo Material</button>
    <button id="btn-c2" onclick="tab(event, 'c2')">Impresión (Pies²)</button>
    <button id="btn-c3" onclick="tab(event, 'c3')">Cotizar Artículos</button>
    <button id="btn-c4" onclick="tab(event, 'c4')">⚙️ Inventario</button>
    <button onclick="logout()">Cerrar sesión</button>
</nav>

<div id="c1" class="container">
    <h2>Analizador de Costo</h2>
    <div class="grid-2">
        <div><label>Ancho (pulg)</label><input type="number" id="b_ancho" placeholder="0"></div>
        <div><label>Alto (pulg)</label><input type="number" id="b_alto" placeholder="0"></div>
    </div>
    <label>Precio Compra</label>
    <input type="number" id="b_precio" placeholder="0.00">
    <button onclick="calcBase()">Calcular Precio/Pie²</button>
    <div id="res_b" style="margin-top:15px; font-weight:bold; text-align:center; color: var(--primary);"></div>
</div>

<div id="c2" class="container wide">
    <h2>Calculadora de Impresión</h2>
    <div class="grid-2">
        <div><label>Descripción</label><input type="text" id="m_desc" placeholder="Ej: Lona"></div>
        <div><label>Unidad</label>
            <select id="m_uni">
                <option value="pulg">Pulgadas</option>
                <option value="pie">Pies</option>
            </select>
        </div>
    </div>
    <div class="grid-3">
        <div><label>Ancho</label><input type="number" id="m_w"></div>
        <div><label>Alto</label><input type="number" id="m_h"></div>
        <div><label>Precio Pie²</label><input type="number" id="m_p"></div>
    </div>
    <button class="btn-add" onclick="addMedida()">+ Agregar Impresión</button>
</div>

<div id="c3" class="container wide">
    <h2>Artículos y Servicios</h2>
    <label>Inventario:</label>
    <select id="v_select" onchange="cargarDesdeInventario()"></select>
    <div class="grid-3" style="grid-template-columns: 2fr 1fr 1fr;">
        <div><label>Artículo</label><input type="text" id="v_desc"></div>
        <div><label>Precio</label><input type="number" id="v_p"></div>
        <div><label>Cant.</label><input type="number" id="v_c" value="1"></div>
    </div>
    <button class="btn-add" onclick="addVarios()">+ Agregar a Cotización</button>
</div>

<div id="c4" class="container">
    <h2>Gestión de Inventario</h2>
    <input type="text" id="inv_nombre" placeholder="Nombre Producto">
    <input type="number" id="inv_precio" placeholder="Precio Venta">
    <button class="btn-success" onclick="guardarInventario()">Guardar</button>
    <ul id="lista_inv" style="list-style:none; padding:0; margin-top:20px;"></ul>
</div>

<div id="global-table-container">
    <div class="table-section">
        <table id="mainTable">
            <thead>
                <tr><th>Descripción</th><th>Detalle</th><th>Subtotal</th><th class="no-print">Acción</th></tr>
            </thead>
            <tbody></tbody>
            <tfoot>
                <tr class="total-row">
                    <td colspan="2" style="text-align:right">TOTAL:</td>
                    <td id="granTotal">RD$ 0.00</td>
                    <td class="no-print"></td>
                </tr>
            </tfoot>
        </table>
        <button class="btn-success no-print" onclick="finalizarYGuardarCotizacion()">💾 Guardar e Imprimir</button>
    </div>
</div>

<script>
    const API_URL = "/inventario";
    let carrito = [];
    let inventario = [];

    window.onload = async () => {
        try {
            const res = await fetch("/check-session");
            const data = await res.json();
            if (data.logged) {
                showApp();
            } else {
                showLogin();
            }
        } catch (e) { showLogin(); }
    };

    function showApp() {
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("mainNav").classList.add("show-flex");
        tab(null, 'c1'); // Carga la primera pestaña
        cargarInventarioDesdeDB();
    }

    function showLogin() {
        document.getElementById("loginBox").style.display = "block";
        document.getElementById("mainNav").classList.remove("show-flex");
        document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
    }

    async function login() {
        const usuario = document.getElementById("login_user").value;
        const password = document.getElementById("login_pass").value;
        const res = await fetch("/login", {
            method: "POST",
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ usuario, password })
        });
        if (res.ok) showApp();
        else alert("Credenciales incorrectas");
    }

    function logout() {
        fetch("/logout").then(() => location.reload());
    }

    function tab(e, id) {
        document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        
        document.getElementById(id).classList.add('active');
        if(e) e.currentTarget.classList.add('active');
        else document.getElementById('btn-' + id).classList.add('active');

        const table = document.getElementById('global-table-container');
        if (id === 'c2' || id === 'c3') {
            table.style.display = "block";
            document.getElementById(id).appendChild(table);
        } else {
            table.style.display = "none";
        }
    }

    async function cargarInventarioDesdeDB() {
        const res = await fetch(API_URL);
        if (res.ok) {
            inventario = await res.json();
            const lista = document.getElementById('lista_inv');
            const select = document.getElementById('v_select');
            lista.innerHTML = "";
            select.innerHTML = '<option value="">-- Seleccionar --</option>';
            inventario.forEach((item, i) => {
                lista.innerHTML += `<li>${item.nombre} - RD$ ${item.precio} <button class="btn-del" onclick="borrarInv(${item.id})">X</button></li>`;
                select.innerHTML += `<option value="${i}">${item.nombre}</option>`;
            });
        }
    }

    function cargarDesdeInventario() {
        const idx = document.getElementById('v_select').value;
        if(idx !== "") {
            document.getElementById('v_desc').value = inventario[idx].nombre;
            document.getElementById('v_p').value = inventario[idx].precio;
        }
    }

    async function guardarInventario() {
        const nombre = document.getElementById('inv_nombre').value;
        const precio = document.getElementById('inv_precio').value;
        await fetch(API_URL, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({nombre, precio})
        });
        cargarInventarioDesdeDB();
    }

    async function borrarInv(id) {
        await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
        cargarInventarioDesdeDB();
    }

    function addMedida() {
        const desc = document.getElementById('m_desc').value || "Impresión";
        const w = parseFloat(document.getElementById('m_w').value);
        const h = parseFloat(document.getElementById('m_h').value);
        const p = parseFloat(document.getElementById('m_p').value);
        if(isNaN(w) || isNaN(h)) return;
        
        let area = (document.getElementById('m_uni').value === 'pulg') ? (w/12)*(h/12) : w*h;
        const sub = area * p;
        carrito.push({ desc, detalle: `${w}x${h} (@RD$ ${p})`, sub });
        updateTable();
    }

    function addVarios() {
        const desc = document.getElementById('v_desc').value;
        const p = parseFloat(document.getElementById('v_p').value);
        const c = parseFloat(document.getElementById('v_c').value);
        carrito.push({ desc, detalle: `${c} unid. x ${p}`, sub: p * c });
        updateTable();
    }

    function updateTable() {
        const tbody = document.querySelector("#mainTable tbody");
        tbody.innerHTML = "";
        let total = 0;
        carrito.forEach((item, i) => {
            total += item.sub;
            tbody.innerHTML += `<tr><td>${item.desc}</td><td>${item.detalle}</td><td>RD$ ${item.sub.toFixed(2)}</td><td><button class="btn-del" onclick="carrito.splice(${i},1);updateTable()">X</button></td></tr>`;
        });
        document.getElementById('granTotal').innerText = `RD$ ${total.toFixed(2)}`;
    }

    function calcBase() {
        const w = document.getElementById('b_ancho').value;
        const h = document.getElementById('b_alto').value;
        const p = document.getElementById('b_precio').value;
        const area = (w/12)*(h/12);
        document.getElementById('res_b').innerHTML = `Costo Pie²: RD$ ${(p/area).toFixed(2)}`;
    }

    async function finalizarYGuardarCotizacion() {
        const total = parseFloat(document.getElementById('granTotal').innerText.replace('RD$ ', ''));
        const res = await fetch("/guardar_cotizacion", {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ total, items: carrito })
        });
        if(res.ok) window.print();
    }
</script>
</body>
</html>
